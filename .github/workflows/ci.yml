name: Test Rules

on:
  push:
  pull_request:

jobs:
  build-and-test:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    strategy:
      matrix:
        bazel_version: ["8.*", "9.*"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Bazel Setup
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ case(matrix.os == 'windows-latest', false, format('{0}-{1}', github.workflow, matrix.os)) }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Build
        run: bazel build //... --verbose_failures --sandbox_debug
      - name: Test
        run: bazel test //... --verbose_failures --sandbox_debug --test_output=errors --test_summary=detailed
