name: Test Rules

on:
  push:

jobs:
  build-and-test:
    strategy:
      matrix:
        bazel_version: ["8.*", "9.*"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Bazel Setup
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Build
        run: bazel build //... --verbose_failures --sandbox_debug
      - name: Test
        run: bazel test //... --verbose_failures --sandbox_debug --test_output=errors --test_summary=detailed
  test-with-cache:
    needs: build-and-test
    runs-on: windows-latest
    strategy:
      matrix:
        bazel_version: ["8.*", "9.*"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Bazel Setup
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Test
        run: bazel test //... --verbose_failures --sandbox_debug --test_output=errors --test_summary=detailed
  test-usage:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bazel_version: ["8.*", "9.*"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
    defaults:
      run:
        working-directory: tests/usagetests
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Bazel Setup
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-usagetests
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Build
        run: bazel build //... --verbose_failures --sandbox_debug
      - name: Test
        run: bazel test //... --verbose_failures --sandbox_debug --test_output=errors --test_summary=detailed
